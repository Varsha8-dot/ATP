<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini-App</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script type="text/babel">
      const { useState } = React;

      const initialForm = { firstName: "", lastName: "", email: "", phone: "", position: "", salary: "" };

      function App() {
        const [form, setForm] = useState(initialForm);
        const [submitted, setSubmitted] = useState(null);
        const [errors, setErrors] = useState({});

        const validate = () => {
          const errs = {};
          if (!form.firstName) errs.firstName = "Required";
          if (!form.lastName) errs.lastName = "Required";
          if (!form.email || !/\S+@\S+\.\S+/.test(form.email)) errs.email = "Valid email required";
          if (!form.phone) errs.phone = "Required";
          if (!form.position) errs.position = "Required";
          if (!form.salary || isNaN(form.salary)) errs.salary = "Valid number required";
          return errs;
        };

        const handleChange = (e) => {
          setForm({ ...form, [e.target.name]: e.target.value });
          setErrors({ ...errors, [e.target.name]: undefined });
        };

        const handleSubmit = (e) => {
          e.preventDefault();
          const errs = validate();
          if (Object.keys(errs).length) { setErrors(errs); return; }
          setSubmitted(form);
          setForm(initialForm);
        };

        return (
          <div style={styles.page}>
            <div style={styles.card}>
              <h2 style={styles.title}>Employee Registration Form</h2>
              {submitted && (
                <div style={styles.success}>
                  ✅ <strong>{submitted.firstName} {submitted.lastName}</strong> registered successfully!
                </div>
              )}
              <form onSubmit={handleSubmit}>
                <div style={styles.row}>
                  <Field label="First Name" name="firstName" value={form.firstName} onChange={handleChange} error={errors.firstName} />
                  <Field label="Last Name" name="lastName" value={form.lastName} onChange={handleChange} error={errors.lastName} />
                </div>
                <div style={styles.row}>
                  <Field label="Email" name="email" type="email" value={form.email} onChange={handleChange} error={errors.email} />
                  <Field label="Phone" name="phone" value={form.phone} onChange={handleChange} error={errors.phone} />
                </div>
                <div style={styles.row}>
                  <Field label="Position" name="position" value={form.position} onChange={handleChange} error={errors.position} />
                  <Field label="Salary (₹)" name="salary" type="number" value={form.salary} onChange={handleChange} error={errors.salary} />
                </div>
                <button style={styles.btn} type="submit">Register Employee</button>
              </form>
            </div>
          </div>
        );
      }

      function Field({ label, name, value, onChange, error, type = "text" }) {
        return (
          <div style={{ flex: 1 }}>
            <label style={styles.label}>{label}</label>
            <input style={{ ...styles.input, ...(error ? styles.inputError : {}) }} name={name} type={type} value={value} onChange={onChange} />
            {error && <span style={styles.error}>{error}</span>}
          </div>
        );
      }

      const styles = {
        page: { minHeight: "100vh", background: "#f0fdf4", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "sans-serif", padding: 16 },
        card: { background: "#fff", borderRadius: 16, padding: "32px 28px", boxShadow: "0 4px 24px rgba(0,0,0,0.08)", width: "100%", maxWidth: 600 },
        title: { margin: "0 0 24px", color: "#15803d", textAlign: "center" },
        row: { display: "flex", gap: 16, marginBottom: 16 },
        label: { display: "block", fontSize: 13, fontWeight: 600, color: "#374151", marginBottom: 4 },
        input: { width: "100%", padding: "9px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 14, boxSizing: "border-box" },
        inputError: { borderColor: "#ef4444" },
        error: { color: "#ef4444", fontSize: 12, marginTop: 2, display: "block" },
        btn: { width: "100%", padding: "12px", background: "#16a34a", color: "#fff", border: "none", borderRadius: 8, fontSize: 16, cursor: "pointer", marginTop: 8 },
        success: { background: "#dcfce7", color: "#15803d", padding: "12px 16px", borderRadius: 8, marginBottom: 20, fontSize: 14 },
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
