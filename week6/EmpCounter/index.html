<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UserCountOnAdd</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script type="text/babel">
      const { useState } = React;

      function App() {
        const [users, setUsers] = useState([]);
        const [name, setName] = useState("");

        const addUser = () => {
          if (!name.trim()) return;
          setUsers([...users, { id: Date.now(), name: name.trim() }]);
          setName("");
        };

        const removeUser = (id) => {
          setUsers(users.filter((u) => u.id !== id));
        };

        return (
          <div style={styles.container}>
            <h2 style={styles.heading}>Employee Counter</h2>
            <div style={styles.counter}>Total Employees: <strong>{users.length}</strong></div>
            <div style={styles.row}>
              <input
                style={styles.input}
                value={name}
                onChange={(e) => setName(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && addUser()}
                placeholder="Enter employee name"
              />
              <button style={styles.btn} onClick={addUser}>Add</button>
            </div>
            <ul style={styles.list}>
              {users.map((u) => (
                <li key={u.id} style={styles.listItem}>
                  <span>{u.name}</span>
                  <button style={styles.delBtn} onClick={() => removeUser(u.id)}>✕</button>
                </li>
              ))}
              {users.length === 0 && <li style={styles.empty}>No employees yet. Add one above.</li>}
            </ul>
          </div>
        );
      }

      const styles = {
        container: { maxWidth: 480, margin: "60px auto", fontFamily: "sans-serif", padding: "0 16px" },
        heading: { textAlign: "center", color: "#1e293b" },
        counter: { textAlign: "center", fontSize: 18, marginBottom: 20, background: "#f1f5f9", borderRadius: 8, padding: "12px" },
        row: { display: "flex", gap: 8, marginBottom: 16 },
        input: { flex: 1, padding: "10px 14px", border: "1px solid #cbd5e1", borderRadius: 8, fontSize: 15 },
        btn: { padding: "10px 20px", background: "#0ea5e9", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 15 },
        list: { listStyle: "none", padding: 0, margin: 0 },
        listItem: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", background: "#f8fafc", borderRadius: 8, marginBottom: 8, border: "1px solid #e2e8f0" },
        delBtn: { background: "transparent", border: "none", color: "#ef4444", fontSize: 16, cursor: "pointer" },
        empty: { textAlign: "center", color: "#94a3b8", padding: "16px" },
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
