<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EmployeeDynamicInsertion</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script type="text/babel">
      const { useState } = React;

      function App() {
        const [employees, setEmployees] = useState([]);
        const [form, setForm] = useState({ name: "", role: "", dept: "" });

        const handleChange = (e) => {
          setForm({ ...form, [e.target.name]: e.target.value });
        };

        const handleSubmit = (e) => {
          e.preventDefault();
          if (!form.name || !form.role || !form.dept) return;
          setEmployees([...employees, { ...form, id: Date.now() }]);
          setForm({ name: "", role: "", dept: "" });
        };

        const handleDelete = (id) => {
          setEmployees(employees.filter((emp) => emp.id !== id));
        };

        return (
          <div style={styles.container}>
            <h2 style={styles.heading}>Employee Dynamic Insertion</h2>
            <form onSubmit={handleSubmit} style={styles.form}>
              <input style={styles.input} name="name" placeholder="Employee Name" value={form.name} onChange={handleChange} />
              <input style={styles.input} name="role" placeholder="Role" value={form.role} onChange={handleChange} />
              <input style={styles.input} name="dept" placeholder="Department" value={form.dept} onChange={handleChange} />
              <button style={styles.btn} type="submit">Add Employee</button>
            </form>
            <table style={styles.table}>
              <thead>
                <tr>
                  <th style={styles.th}>#</th>
                  <th style={styles.th}>Name</th>
                  <th style={styles.th}>Role</th>
                  <th style={styles.th}>Department</th>
                  <th style={styles.th}>Action</th>
                </tr>
              </thead>
              <tbody>
                {employees.map((emp, i) => (
                  <tr key={emp.id}>
                    <td style={styles.td}>{i + 1}</td>
                    <td style={styles.td}>{emp.name}</td>
                    <td style={styles.td}>{emp.role}</td>
                    <td style={styles.td}>{emp.dept}</td>
                    <td style={styles.td}>
                      <button style={styles.delBtn} onClick={() => handleDelete(emp.id)}>Delete</button>
                    </td>
                  </tr>
                ))}
                {employees.length === 0 && (
                  <tr><td colSpan="5" style={{ textAlign: "center", padding: "16px", color: "#aaa" }}>No employees added yet.</td></tr>
                )}
              </tbody>
            </table>
          </div>
        );
      }

      const styles = {
        container: { maxWidth: 700, margin: "40px auto", fontFamily: "sans-serif", padding: "0 16px" },
        heading: { textAlign: "center", color: "#333" },
        form: { display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 24 },
        input: { flex: 1, minWidth: 140, padding: "8px 12px", border: "1px solid #ccc", borderRadius: 6, fontSize: 14 },
        btn: { padding: "8px 20px", background: "#4f46e5", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 14 },
        table: { width: "100%", borderCollapse: "collapse" },
        th: { background: "#4f46e5", color: "#fff", padding: "10px 12px", textAlign: "left" },
        td: { padding: "10px 12px", borderBottom: "1px solid #eee" },
        delBtn: { background: "#ef4444", color: "#fff", border: "none", borderRadius: 4, padding: "4px 12px", cursor: "pointer" },
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
